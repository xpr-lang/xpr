suite: examples
version: "0.1.0"
tests:
  - name: simple arithmetic
    expression: "1 + 2"
    expected: 3
    tags: ["level-1", "core"]

  - name: context variable access
    expression: "user.name"
    context:
      user:
        name: "Alice"
    expected: "Alice"
    tags: ["level-1", "core"]

  - name: division by zero error
    expression: "1 / 0"
    error: "Division by zero"
    tags: ["level-1", "core"]
