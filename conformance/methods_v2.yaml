suite: methods_v2
version: "0.2.0"
tests:
  # ─── Array: includes ───────────────────────────────────────────────────────
  - name: array includes found
    expression: "[1,2,3].includes(2)"
    expected: true
    tags: ["level-3", "advanced"]

  - name: array includes not found
    expression: "[1,2,3].includes(5)"
    expected: false
    tags: ["level-3", "advanced"]

  - name: array includes type sensitive number vs string
    expression: '[1,2,3].includes("1")'
    expected: false
    tags: ["level-3", "advanced"]

  # ─── Array: indexOf ────────────────────────────────────────────────────────
  - name: array indexOf found returns index
    expression: "[10,20,30].indexOf(20)"
    expected: 1
    tags: ["level-3", "advanced"]

  - name: array indexOf not found returns negative one
    expression: "[10,20,30].indexOf(99)"
    expected: -1
    tags: ["level-3", "advanced"]

  - name: array indexOf first occurrence
    expression: "[1,2,1,3].indexOf(1)"
    expected: 0
    tags: ["level-3", "advanced"]

  # ─── Array: slice ──────────────────────────────────────────────────────────
  - name: array slice middle
    expression: "[1,2,3,4].slice(1,3)"
    expected: [2, 3]
    tags: ["level-3", "advanced"]

  - name: array slice from start
    expression: "[1,2,3].slice(0,2)"
    expected: [1, 2]
    tags: ["level-3", "advanced"]

  - name: array slice beyond length returns empty
    expression: "[1,2,3].slice(5)"
    expected: []
    tags: ["level-3", "advanced"]

  # ─── Array: join ───────────────────────────────────────────────────────────
  - name: array join with separator
    expression: '[1,2,3].join(", ")'
    expected: "1, 2, 3"
    tags: ["level-3", "advanced"]

  - name: array join empty array
    expression: '[].join(",")'
    expected: ""
    tags: ["level-3", "advanced"]

  - name: array join single element
    expression: '["a"].join(",")'
    expected: "a"
    tags: ["level-3", "advanced"]

  # ─── Array: concat ─────────────────────────────────────────────────────────
  - name: array concat two arrays
    expression: "[1,2].concat([3,4])"
    expected: [1, 2, 3, 4]
    tags: ["level-3", "advanced"]

  - name: array concat with empty array
    expression: "[1,2].concat([])"
    expected: [1, 2]
    tags: ["level-3", "advanced"]

  - name: array concat with context
    expression: "a.concat(b)"
    context:
      a: [1, 2]
      b: [3, 4, 5]
    expected: [1, 2, 3, 4, 5]
    tags: ["level-3", "advanced"]

  # ─── Array: flat ───────────────────────────────────────────────────────────
  - name: array flat nested once
    expression: "[[1,2],[3,4]].flat()"
    expected: [1, 2, 3, 4]
    tags: ["level-3", "advanced"]

  - name: array flat already flat
    expression: "[1,2,3].flat()"
    expected: [1, 2, 3]
    tags: ["level-3", "advanced"]

  - name: array flat one level only mixed
    expression: "[1,[2,[3]]].flat()"
    expected: [1, 2, [3]]
    tags: ["level-3", "advanced"]

  # ─── Array: unique ─────────────────────────────────────────────────────────
  - name: array unique removes duplicates
    expression: "[1,2,1,3,2].unique()"
    expected: [1, 2, 3]
    tags: ["level-3", "advanced"]

  - name: array unique no duplicates unchanged
    expression: "[1,2,3].unique()"
    expected: [1, 2, 3]
    tags: ["level-3", "advanced"]

  - name: array unique preserves order
    expression: "[3,1,2,1,3].unique()"
    expected: [3, 1, 2]
    tags: ["level-3", "advanced"]

  # ─── Array: zip ────────────────────────────────────────────────────────────
  - name: array zip equal length
    expression: "[1,2,3].zip([4,5,6])"
    expected: [[1, 4], [2, 5], [3, 6]]
    tags: ["level-3", "advanced"]

  - name: array zip unequal truncates to shorter
    expression: "[1,2,3].zip([4,5])"
    expected: [[1, 4], [2, 5]]
    tags: ["level-3", "advanced"]

  - name: array zip empty array
    expression: "[].zip([1,2])"
    expected: []
    tags: ["level-3", "advanced"]

  # ─── Array: chunk ──────────────────────────────────────────────────────────
  - name: array chunk even split
    expression: "[1,2,3,4].chunk(2)"
    expected: [[1, 2], [3, 4]]
    tags: ["level-3", "advanced"]

  - name: array chunk uneven last chunk smaller
    expression: "[1,2,3].chunk(2)"
    expected: [[1, 2], [3]]
    tags: ["level-3", "advanced"]

  - name: array chunk size one
    expression: "[1,2,3].chunk(1)"
    expected: [[1], [2], [3]]
    tags: ["level-3", "advanced"]

  # ─── Array: groupBy ────────────────────────────────────────────────────────
  - name: array groupBy by computed even odd
    expression: '[1,2,3,4].groupBy(x => x % 2 == 0 ? "even" : "odd")'
    expected:
      even: [2, 4]
      odd: [1, 3]
    tags: ["level-3", "advanced"]

  - name: array groupBy empty array
    expression: '[].groupBy(x => x)'
    expected: {}
    tags: ["level-3", "advanced"]

  - name: array groupBy by property
    expression: "items.groupBy(x => x.type)"
    context:
      items:
        - {type: "a", val: 1}
        - {type: "b", val: 2}
        - {type: "a", val: 3}
    expected:
      a:
        - {type: "a", val: 1}
        - {type: "a", val: 3}
      b:
        - {type: "b", val: 2}
    tags: ["level-3", "advanced"]

  # ─── String: indexOf ───────────────────────────────────────────────────────
  - name: string indexOf found returns index
    expression: '"hello".indexOf("ll")'
    expected: 2
    tags: ["level-3", "advanced"]

  - name: string indexOf not found returns negative one
    expression: '"hello".indexOf("xyz")'
    expected: -1
    tags: ["level-3", "advanced"]

  - name: string indexOf from start
    expression: '"hello".indexOf("h")'
    expected: 0
    tags: ["level-3", "advanced"]

  # ─── String: repeat ────────────────────────────────────────────────────────
  - name: string repeat normal
    expression: '"ab".repeat(3)'
    expected: "ababab"
    tags: ["level-3", "advanced"]

  - name: string repeat zero times
    expression: '"ab".repeat(0)'
    expected: ""
    tags: ["level-3", "advanced"]

  - name: string repeat once
    expression: '"ab".repeat(1)'
    expected: "ab"
    tags: ["level-3", "advanced"]

  # ─── String: trimStart ─────────────────────────────────────────────────────
  - name: string trimStart removes leading whitespace
    expression: '"  hello".trimStart()'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string trimStart no leading whitespace unchanged
    expression: '"hello".trimStart()'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string trimStart only whitespace becomes empty
    expression: '"   ".trimStart()'
    expected: ""
    tags: ["level-3", "advanced"]

  # ─── String: trimEnd ───────────────────────────────────────────────────────
  - name: string trimEnd removes trailing whitespace
    expression: '"hello  ".trimEnd()'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string trimEnd no trailing whitespace unchanged
    expression: '"hello".trimEnd()'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string trimEnd only whitespace becomes empty
    expression: '"   ".trimEnd()'
    expected: ""
    tags: ["level-3", "advanced"]

  # ─── String: charAt ────────────────────────────────────────────────────────
  - name: string charAt valid index
    expression: '"hello".charAt(1)'
    expected: "e"
    tags: ["level-3", "advanced"]

  - name: string charAt out of bounds returns empty string
    expression: '"hello".charAt(10)'
    expected: ""
    tags: ["level-3", "advanced"]

  - name: string charAt first character
    expression: '"hello".charAt(0)'
    expected: "h"
    tags: ["level-3", "advanced"]

  # ─── String: padStart ──────────────────────────────────────────────────────
  - name: string padStart pads shorter string
    expression: '"5".padStart(3,"0")'
    expected: "005"
    tags: ["level-3", "advanced"]

  - name: string padStart already long enough unchanged
    expression: '"hello".padStart(3)'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string padStart default pad char is space
    expression: '"5".padStart(3)'
    expected: "  5"
    tags: ["level-3", "advanced"]

  # ─── String: padEnd ────────────────────────────────────────────────────────
  - name: string padEnd pads shorter string
    expression: '"5".padEnd(3,".")'
    expected: "5.."
    tags: ["level-3", "advanced"]

  - name: string padEnd already long enough unchanged
    expression: '"hello".padEnd(3)'
    expected: "hello"
    tags: ["level-3", "advanced"]

  - name: string padEnd default pad char is space
    expression: '"5".padEnd(3)'
    expected: "5  "
    tags: ["level-3", "advanced"]

  # ─── Object: entries ───────────────────────────────────────────────────────
  - name: object entries multi key alphabetical order
    expression: '{"c":3,"a":1,"b":2}.entries()'
    expected: [["a", 1], ["b", 2], ["c", 3]]
    tags: ["level-3", "advanced"]

  - name: object entries single key
    expression: '{"x":1}.entries()'
    expected: [["x", 1]]
    tags: ["level-3", "advanced"]

  - name: object entries empty object
    expression: '{}.entries()'
    expected: []
    tags: ["level-3", "advanced"]

  # ─── Object: has ───────────────────────────────────────────────────────────
  - name: object has existing key returns true
    expression: '{"a":1}.has("a")'
    expected: true
    tags: ["level-3", "advanced"]

  - name: object has missing key returns false
    expression: '{"a":1}.has("b")'
    expected: false
    tags: ["level-3", "advanced"]

  - name: object has nested key not checked at top level
    expression: '{"a":{"b":1}}.has("b")'
    expected: false
    tags: ["level-3", "advanced"]

  # ─── Global: range ─────────────────────────────────────────────────────────
  - name: range single arg from zero
    expression: "range(5)"
    expected: [0, 1, 2, 3, 4]
    tags: ["level-3", "advanced"]

  - name: range two args start and end
    expression: "range(2,5)"
    expected: [2, 3, 4]
    tags: ["level-3", "advanced"]

  - name: range three args with step
    expression: "range(0,10,3)"
    expected: [0, 3, 6, 9]
    tags: ["level-3", "advanced"]

  - name: range negative step counts down
    expression: "range(5,0,-1)"
    expected: [5, 4, 3, 2, 1]
    tags: ["level-3", "advanced"]

  - name: range empty when start equals end
    expression: "range(5,0)"
    expected: []
    tags: ["level-3", "advanced"]

  - name: range float step error
    expression: "range(0,10,0.5)"
    error: "float"
    tags: ["level-3", "advanced"]
