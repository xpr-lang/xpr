suite: logic
version: "0.1.0"
tests:
  - name: logical and both true
    expression: "true && true"
    expected: true
    tags: ["level-1", "core"]

  - name: logical and with false
    expression: "true && false"
    expected: false
    tags: ["level-1", "core"]

  - name: logical or with true
    expression: "false || true"
    expected: true
    tags: ["level-1", "core"]

  - name: logical or both false
    expression: "false || false"
    expected: false
    tags: ["level-1", "core"]

  - name: logical not true
    expression: "!true"
    expected: false
    tags: ["level-1", "core"]

  - name: logical not false
    expression: "!false"
    expected: true
    tags: ["level-1", "core"]

  - name: logical not null
    expression: "!null"
    expected: true
    tags: ["level-1", "core"]

  - name: logical not zero
    expression: "!0"
    expected: true
    tags: ["level-1", "core"]

  - name: logical not empty string
    expression: '!""'
    expected: true
    tags: ["level-1", "core"]

  - name: short-circuit and falsy returns left
    expression: '0 && "hello"'
    expected: 0
    tags: ["level-1", "core"]

  - name: short-circuit and truthy returns right
    expression: '1 && "hello"'
    expected: "hello"
    tags: ["level-1", "core"]

  - name: short-circuit or truthy returns left
    expression: '"first" || "second"'
    expected: "first"
    tags: ["level-1", "core"]

  - name: nullish coalescing null returns default
    expression: 'null ?? "default"'
    expected: "default"
    tags: ["level-1", "core"]

  - name: nullish coalescing zero is not nullish
    expression: '0 ?? "default"'
    expected: 0
    tags: ["level-1", "core"]

  - name: nullish coalescing empty string is not nullish
    expression: '"" ?? "default"'
    expected: ""
    tags: ["level-1", "core"]

  - name: ternary true branch
    expression: 'true ? "yes" : "no"'
    expected: "yes"
    tags: ["level-1", "core"]

  - name: ternary false branch
    expression: 'false ? "yes" : "no"'
    expected: "no"
    tags: ["level-1", "core"]

  - name: ternary with context positive
    expression: 'a > 0 ? "positive" : "non-positive"'
    context:
      a: 5
    expected: "positive"
    tags: ["level-1", "core"]

  - name: nested ternary negative
    expression: 'a > 0 ? "positive" : a < 0 ? "negative" : "zero"'
    context:
      a: -3
    expected: "negative"
    tags: ["level-1", "core"]
